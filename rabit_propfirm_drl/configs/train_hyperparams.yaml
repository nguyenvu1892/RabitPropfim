# ═══════════════════════════════════════════════════════════════
# V3 — GPU-Optimized Hyperparameters (RTX 4090 24GB VRAM)
# ═══════════════════════════════════════════════════════════════
# Target: GPU-Util ≥ 85%, VRAM ≥ 80% usage

# ═══ SAC Algorithm Config ═══
algo: sac
learning_rate: 1.0e-4           # Conservative for 5-dim action
batch_size: 2048                # V3: from 256 → 2048 (fill 4090 VRAM)
gamma: 0.99
tau: 0.005
alpha_lr: 3.0e-4
target_entropy: -2.0            # V3: from -5.0 → -2.0 (anti mode collapse)

# ═══ Rollout Collection ═══
n_envs: 32                      # V3: from 16 → 32 (max CPU cores on RunPod)
n_steps: 4096                   # V3: NEW — rollout steps before update
n_updates_per_rollout: 8        # V3: NEW — gradient steps per rollout
                                # Total data per rollout = n_envs × n_steps = 32 × 4096 = 131K
                                # Each update uses batch_size=2048 sampled from buffer

# ═══ Replay Buffer ═══
buffer_size: 500_000            # V3: reduced from 1M (RAM efficient on RunPod)
per_alpha: 0.6
per_beta_start: 0.4
per_beta_frames: 500_000

# ═══ Network Architecture ═══
transformer_embed_dim: 128
transformer_n_heads: 4
transformer_n_layers: 2
transformer_dropout: 0.1

actor_hidden_dims: [256, 256]
critic_hidden_dims: [256, 256]

# ═══ Regime Detector ═══
regime_n_states: 4

# ═══ Curriculum V3 Stages ═══
# GPU-optimized: larger envs + batches per stage
curriculum_stages: 3
curriculum_stage_configs:
  stage_1:
    name: "Stage1_Context"
    description: "Context Recognition: M15+H1 only"
    total_steps: 200_000
    learning_rate: 1.0e-4
    batch_size: 2048
    n_envs: 32
    n_steps: 4096
    episode_length: 2000
  stage_2:
    name: "Stage2_Precision"
    description: "Precision Entry: Add M5"
    total_steps: 300_000
    learning_rate: 1.0e-4
    batch_size: 2048
    n_envs: 32
    n_steps: 4096
    episode_length: 2000
  stage_3:
    name: "Stage3_FullFusion"
    description: "Full Integration: All 4 TFs"
    total_steps: 500_000
    learning_rate: 5.0e-5
    batch_size: 4096              # Stage 3: push to 4096 (all TFs active)
    n_envs: 32
    n_steps: 8192                 # Longer rollout for full context
    episode_length: 2000

# ═══ Training ═══
total_timesteps: 1_000_000
eval_frequency: 10_000
checkpoint_frequency: 50_000
n_eval_episodes: 20
warmup_steps: 10_000
gradient_clip_norm: 0.5           # V3: tighter clip for stability

# ═══ GPU Memory Guide ═══
# RTX 4090 (24GB VRAM) allocation estimate:
#   Model (Actor+Critic):     ~50 MB
#   Batch 2048 × 4TF:         ~400 MB  (m1=128×50, m5=64×50, m15=48×50, h1=24×50)
#   Batch 4096 × 4TF:         ~800 MB
#   Replay buffer (GPU):      ~2 GB (if on GPU, else CPU)
#   Gradients + optimizer:    ~200 MB
#   Total peak:               ~3.5 GB → Safe headroom (24GB)
#
# If OOM at batch_size=4096:
#   1. Drop to batch_size=2048
#   2. Use gradient_accumulation_steps=2

# ═══ W&B Tracking ═══
wandb_project: "rabit-propfirm-v3"
wandb_entity: null
wandb_log_frequency: 100
