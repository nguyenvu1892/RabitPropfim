# ─── Target Symbols ───
target_symbols:
  - XAUUSD          # Gold
  - US100.cash      # Nasdaq 100
  - US30.cash       # Dow Jones 30
  - ETHUSD          # Ethereum
  - BTCUSD          # Bitcoin

# ─── Prop Firm Rules ───
max_daily_drawdown: 0.05        # 5% daily drawdown limit
max_total_drawdown: 0.10        # 10% total drawdown limit
profit_target: 0.10             # 10% profit target
min_trading_days: 4             # Minimum trading days
trading_start_utc: 1            # 01:00 UTC (Asian session open)
trading_end_utc: 21             # 21:00 UTC (US session close)
max_lots_per_trade: 10.0        # Maximum lot size per single trade
max_open_positions: 5           # Maximum concurrent open positions
max_trades_per_day: 15          # Overtrading threshold

# Reward Engine Weights
overnight_penalty: -5.0         # Penalty for holding past session end
unrealized_shaping_weight: 0.1  # Weight for unrealized PnL shaping
rr_bonus_threshold: 1.5         # Minimum RR ratio for bonus
rr_bonus_coefficient: 0.3       # Bonus multiplier for good RR
overtrading_penalty: -0.5       # Per-trade penalty when exceeding max
inaction_nudge: -0.5            # Strong penalty for excessive inaction (was -0.01)
inaction_threshold_steps: 500   # Steps before inaction penalty kicks in

# Drawdown Penalty (Exponential)
dd_penalty_alpha: 2.0           # Penalty base coefficient
dd_penalty_beta: 3.0            # Exponential growth rate
dd_penalty_start: 0.02          # Start penalizing from 2% DD

# Action Gating — Dual Entry System (M1 Sniper + M5 Normal)
confidence_threshold: 0.15      # Legacy fallback (overridden by dual thresholds below)
m5_normal_threshold: 0.50       # |confidence| >= 0.50 + entry_type < 0 => M5 Normal Entry
m1_sniper_threshold: 0.85       # |confidence| >= 0.85 + entry_type > 0 => M1 Sniper Entry

# ─── Asymmetric Reward (Sniper 5:1 Normal) ───
sniper_win_multiplier: 5.0      # Sniper M1 win reward multiplier (vs 1.0 for M5)
sniper_loss_multiplier: 3.0     # Sniper M1 loss penalty multiplier (vs 1.0 for M5)

# ─── FOMO Oracle (training only, NOT used in live inference) ───
fomo_penalty: -5.0              # Penalty for missing obvious M1 setup
fomo_lookahead_steps: 50        # Bars to look ahead for oracle
fomo_move_threshold_pct: 0.005  # 0.5% price move = "obvious setup"

# ─── Strict Risk Management ───
max_loss_per_trade_pct: 0.003    # 0.3% max loss per single trade
daily_loss_cooldown_pct: 0.03    # 3% daily loss → stop trading, resume next day

# ─── SMC Exit Rules ───
h1_inside_bar_exit: true          # H1 inside bar → chốt hết lệnh, chờ cơ hội tiếp

# Risk Killswitch (Prop Firm hard limits)
killswitch_dd_threshold: 0.045  # Force-close all at 4.5% DD (buffer before 5%)

# Spread & Execution Simulation (per-symbol defaults)
symbol_configs:
  XAUUSD:
    base_spread_pips: 20.0       # Gold spread ~20 points
    pip_value: 0.01
    fixed_lot: 0.01              # Conservative XAUUSD lot
  US100.cash:
    base_spread_pips: 1.5        # Nasdaq spread ~1.5 points
    pip_value: 0.01
  US30.cash:
    base_spread_pips: 2.0        # Dow spread ~2.0 points
    pip_value: 0.01
  ETHUSD:
    base_spread_pips: 2.0        # ETH spread ~2.0 points
    pip_value: 0.01
  BTCUSD:
    base_spread_pips: 25.0       # BTC spread ~25 points
    pip_value: 0.01

# General Execution params
news_spread_multiplier: 8.0     # Spread multiplier during news
low_liquidity_multiplier: 2.5   # Spread multiplier during low liquidity
slippage_base_pips: 0.2         # Base slippage
slippage_lot_coefficient: 0.1   # Additional slippage per log(lot)
execution_delay_min_ms: 50      # Minimum execution delay
execution_delay_max_ms: 150     # Maximum execution delay
partial_fill_probability: 0.05  # 5% chance of partial fill
requote_probability: 0.02       # 2% chance of requote
